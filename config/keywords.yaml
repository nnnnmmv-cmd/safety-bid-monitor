# 안전점검 공고 매칭 규칙. 코드 수정 없이 이 파일만 편집해서 정밀도를 조정.

# 포함 키워드 — 제목/본문에 하나라도 있으면 후보
include:
  - "안전점검 수행기관"
  - "건설공사 안전점검"
  - "안전점검 용역"
  - "정밀안전점검"
  - "정밀안전진단"
  - "정기안전점검"
  - "초기점검"
  - "구조안전진단"
  - "구조안전점검"
  - "내진성능평가"
  - "시설물 안전"
  - "안전진단 용역"

# 제외 키워드 — 하나라도 있으면 탈락 (다른 분야 오탐 제거)
exclude:
  - "전기안전"
  - "소방안전"
  - "가스안전"
  - "어린이놀이"
  - "식품안전"
  - "교통안전"
  - "산업안전"
  - "보안점검"
  - "낙찰결과"
  - "개찰결과"
  - "선정결과"

# 매칭할 필드 (어댑터가 채운 항목만 검사됨)
require_match_in:
  - title
  - body
